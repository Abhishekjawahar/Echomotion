<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EchoMotion</title>
<style>
  body{margin:0;background:#050505;color:#eee;font-family:system-ui;overflow:hidden}
  canvas{display:block}
  #ui{position:fixed;top:12px;left:12px;z-index:10;background:rgba(20,20,20,0.7);backdrop-filter:blur(10px);padding:14px;border-radius:14px;width:300px}
  .row{display:flex;gap:8px}
  input,select,button{width:100%;margin-top:6px}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="ui">
<b>EchoMotion</b>
<div class="row">
<button id="front">Front</button>
<button id="back">Back</button>
</div>
<button id="upload">Upload</button>
<input type="file" id="file" accept="video/*" style="display:none">
<label>Sensitivity <input id="sens" type="range" min="10" max="80" value="40"></label>
<label>Min Blob <input id="min" type="range" min="20" max="400" value="120"></label>
<label>Trail <input id="trail" type="range" min="2" max="30" value="12"></label>
<label>BPM <input id="bpm" type="range" min="60" max="140" value="90"></label>
<label>Overlay <select id="overlay"><option value="none">None</option><option value="hull">Hull</option><option value="mesh">Mesh</option><option value="cells">Cells</option></select></label>
<div class="row"><button id="rec">Record</button><button id="dl" disabled>Download</button></div>
</div>

<script>
const v=document.getElementById('video');
const c=document.getElementById('canvas');
const x=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}onresize=resize;resize();

// INPUT
let stream=null;
async function cam(mode){if(stream)stream.getTracks().forEach(t=>t.stop());stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode}});v.srcObject=stream;}
front.onclick=()=>cam('user');
back.onclick=()=>cam('environment');
upload.onclick=()=>file.click();
file.onchange=e=>{if(stream)stream.getTracks().forEach(t=>t.stop());v.srcObject=null;v.src=URL.createObjectURL(e.target.files[0]);v.play();};

// ASPECT CORRECT DRAW
function drawVideo(){const vw=v.videoWidth,vh=v.videoHeight;if(!vw)return null;const s=Math.min(W/vw,H/vh);const w=vw*s,h=vh*s;const ox=(W-w)/2,oy=(H-h)/2;x.drawImage(v,ox,oy,w,h);return{ox,oy,w,h};}

// ORIGINAL STYLE BLOB ENGINE (grouped regions)
let prevFrame, prevBlobs=[], idc=0;
function getBlobs(){
 const frame=x.getImageData(0,0,W,H);
 const blobs=[],vis=new Uint8Array(W*H);
 const th=+sens.value;
 const idx=(x,y)=>y*W+x;
 if(prevFrame){
  for(let y=0;y<H;y+=2){
   for(let x0=0;x0<W;x0+=2){
    let i=(y*W+x0)*4;
    if(Math.abs(frame.data[i]-prevFrame.data[i])>th && !vis[idx(x0,y)]){
     let stack=[[x0,y]],pts=[];
     while(stack.length){
      let [sx,sy]=stack.pop();
      if(sx<0||sy<0||sx>=W||sy>=H)continue;
      let id=idx(sx,sy);
      if(vis[id])continue;
      let si=(sy*W+sx)*4;
      if(Math.abs(frame.data[si]-prevFrame.data[si])<th)continue;
      vis[id]=1;pts.push([sx,sy]);
      stack.push([sx+2,sy],[sx-2,sy],[sx,sy+2],[sx,sy-2]);
     }
     if(pts.length>+min.value){
      let cx=0,cy=0;pts.forEach(p=>{cx+=p[0];cy+=p[1];});
      blobs.push({cx:cx/pts.length,cy:cy/pts.length,pts});
     }
    }
   }
  }
 }
 prevFrame=frame;return blobs;
}

function track(blobs){
 blobs.forEach(b=>{
  let best=null,dmin=1e9;
  prevBlobs.forEach(p=>{
   let d=Math.hypot(b.cx-p.cx,b.cy-p.cy);
   if(d<dmin&&d<60){dmin=d;best=p;}
  });
  if(best){b.id=best.id;b.v=Math.hypot(b.cx-best.cx,b.cy-best.cy);} else{b.id=idc++;b.v=0;}
 });
 prevBlobs=blobs;
}

// OVERLAYS (restored properly)
function hull(b){if(b.length<3)return;x.strokeStyle='yellow';x.beginPath();b.forEach((p,i)=>i?x.lineTo(p.cx,p.cy):x.moveTo(p.cx,p.cy));x.closePath();x.stroke();}
function mesh(b){x.strokeStyle='lime';b.forEach(a=>b.forEach(d=>{if(a!==d){x.beginPath();x.moveTo(a.cx,a.cy);x.lineTo(d.cx,d.cy);x.stroke();}}));}
function cells(b){x.fillStyle='cyan';b.forEach(a=>{x.beginPath();x.arc(a.cx,a.cy,2,0,6.28);x.fill();});}

// AUDIO (ambient + harmonic reaction)
const actx=new AudioContext();
let baseOsc=actx.createOscillator();
let baseGain=actx.createGain();
baseOsc.type='sine';baseOsc.frequency.value=110;baseGain.gain.value=0.1;baseOsc.connect(baseGain).connect(actx.destination);baseOsc.start();

function react(blobs){
 if(!blobs.length)return;
 let avg=blobs.reduce((a,b)=>a+b.v,0)/blobs.length;
 baseOsc.frequency.setTargetAtTime(90+avg,actx.currentTime,0.1);
 baseGain.gain.setTargetAtTime(Math.min(0.3,avg/200),actx.currentTime,0.1);
}

// RECORD
let rec,chunks=[];
rec.onclick=()=>{
 if(!rec._on){rec._on=true;rec.innerText='Stop';rec._mr=new MediaRecorder(c.captureStream(30));rec._mr.ondataavailable=e=>chunks.push(e.data);rec._mr.onstop=()=>dl.disabled=false;rec._mr.start();}
 else{rec._on=false;rec.innerText='Record';rec._mr.stop();}
};
dl.onclick=()=>{let b=new Blob(chunks);let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='echomotion.webm';a.click();};

// DRAW
let history=[];
function draw(blobs){
 x.clearRect(0,0,W,H);
 drawVideo();
 history.push(blobs.map(b=>({x:b.cx,y:b.cy})));
 if(history.length>+trail.value)history.shift();
 x.strokeStyle='rgba(0,255,255,0.3)';
 history.forEach(f=>{x.beginPath();f.forEach(p=>x.lineTo(p.x,p.y));x.stroke();});
 blobs.forEach(b=>{x.fillStyle=`hsl(${b.id*60%360},100%,60%)`;x.beginPath();x.arc(b.cx,b.cy,6,0,6.28);x.fill();});
 let m=overlay.value;if(m==='hull')hull(blobs);if(m==='mesh')mesh(blobs);if(m==='cells')cells(blobs);
}

function loop(){requestAnimationFrame(loop);if(v.readyState<2)return;drawVideo();let b=getBlobs();track(b);draw(b);react(b);}loop();
</script>
</body>
</html>
