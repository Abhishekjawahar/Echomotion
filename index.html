<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EchoMotion</title>
<style>
  body{margin:0;background:#0b0b0b;color:#eaeaea;font-family:system-ui, -apple-system, Segoe UI, Roboto;overflow:hidden}
  canvas{display:block}
  #ui{position:fixed;top:14px;left:14px;z-index:10;background:rgba(18,18,18,0.75);backdrop-filter:blur(12px);padding:14px;border-radius:16px;width:320px;box-shadow:0 20px 40px rgba(0,0,0,.5)}
  h3{margin:0 0 8px 0;font-weight:600}
  .row{display:flex;gap:8px}
  label{font-size:12px;opacity:.8;margin-top:8px;display:block}
  input,select,button{width:100%;margin-top:6px;background:#121212;color:#eee;border:1px solid #2a2a2a;border-radius:8px;padding:8px}
  button{cursor:pointer}
  button:hover{background:#1a1a1a}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <h3>EchoMotion</h3>
  <div class="row">
    <button id="btnFront">Front</button>
    <button id="btnBack">Back</button>
  </div>
  <button id="btnUpload">Upload Video</button>
  <input type="file" id="fileInput" accept="video/*" style="display:none">

  <label>Sensitivity <input id="sens" type="range" min="10" max="80" value="40"></label>
  <label>Min Blob Size <input id="min" type="range" min="20" max="400" value="120"></label>
  <label>Trail Length <input id="trail" type="range" min="2" max="30" value="12"></label>
  <label>BPM <input id="bpm" type="range" min="60" max="140" value="90"></label>

  <label>Overlay
    <select id="overlay">
      <option value="none">None</option>
      <option value="hull">Hull</option>
      <option value="mesh">Mesh</option>
      <option value="cells">Cells</option>
    </select>
  </label>

  <div class="row">
    <button id="rec">Record</button>
    <button id="dl" disabled>Download</button>
  </div>
</div>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const sens=document.getElementById('sens');
const min=document.getElementById('min');
const trailInput=document.getElementById('trail');
const bpm=document.getElementById('bpm');
const overlay=document.getElementById('overlay');

let W,H; function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;} window.onresize=resize; resize();

// INPUT FIXED
let stream=null;
async function startCam(mode){
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode}});
    video.srcObject=stream;
    await video.play();
  }catch(e){ alert('Camera error: '+e.message); }
}

document.getElementById('btnFront').onclick=()=>startCam('user');
document.getElementById('btnBack').onclick=()=>startCam('environment');

document.getElementById('btnUpload').onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  if(stream) stream.getTracks().forEach(t=>t.stop());
  video.srcObject=null;
  video.src=URL.createObjectURL(f);
  video.loop=true;
  video.play();
};

// ASPECT RATIO FIX
function drawVideo(){
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!vw||!vh) return null;
  const scale=Math.min(W/vw,H/vh);
  const w=vw*scale, h=vh*scale;
  const x=(W-w)/2, y=(H-h)/2;
  ctx.drawImage(video,x,y,w,h);
  return {x,y,w,h};
}

// ORIGINAL BLOB ENGINE
let prevFrame=null, prevBlobs=[], idCounter=0;
function getBlobs(){
  const frame=ctx.getImageData(0,0,W,H);
  const blobs=[], visited=new Uint8Array(W*H);
  const th=+sens.value;
  const idx=(x,y)=>y*W+x;

  if(prevFrame){
    for(let y=0;y<H;y+=2){
      for(let x0=0;x0<W;x0+=2){
        const i=(y*W+x0)*4;
        if(Math.abs(frame.data[i]-prevFrame.data[i])>th && !visited[idx(x0,y)]){
          let stack=[[x0,y]], pts=[];
          while(stack.length){
            const [sx,sy]=stack.pop();
            if(sx<0||sy<0||sx>=W||sy>=H) continue;
            const id=idx(sx,sy);
            if(visited[id]) continue;
            const si=(sy*W+sx)*4;
            if(Math.abs(frame.data[si]-prevFrame.data[si])<th) continue;
            visited[id]=1; pts.push([sx,sy]);
            stack.push([sx+2,sy],[sx-2,sy],[sx,sy+2],[sx,sy-2]);
          }
          if(pts.length>+min.value){
            let cx=0,cy=0; pts.forEach(p=>{cx+=p[0];cy+=p[1];});
            blobs.push({cx:cx/pts.length,cy:cy/pts.length,pts});
          }
        }
      }
    }
  }
  prevFrame=frame;
  return blobs;
}

function track(blobs){
  blobs.forEach(b=>{
    let best=null, dmin=1e9;
    prevBlobs.forEach(p=>{
      const d=Math.hypot(b.cx-p.cx,b.cy-p.cy);
      if(d<dmin && d<60){ dmin=d; best=p; }
    });
    if(best){ b.id=best.id; b.v=Math.hypot(b.cx-best.cx,b.cy-best.cy); }
    else{ b.id=idCounter++; b.v=0; }
  });
  prevBlobs=blobs;
}

// AUDIO FIX (user gesture required)
const actx=new (window.AudioContext||window.webkitAudioContext)();
let baseOsc=null, baseGain=null;
function initAudio(){
  if(baseOsc) return;
  baseOsc=actx.createOscillator();
  baseGain=actx.createGain();
  baseOsc.type='sine'; baseOsc.frequency.value=110;
  baseGain.gain.value=0.1;
  baseOsc.connect(baseGain).connect(actx.destination);
  baseOsc.start();
}

document.body.addEventListener('click', ()=>{
  if(actx.state!=='running') actx.resume();
  initAudio();
}, {once:true});

function react(blobs){
  if(!baseOsc || !blobs.length) return;
  const avg=blobs.reduce((a,b)=>a+b.v,0)/blobs.length;
  baseOsc.frequency.setTargetAtTime(90+avg,actx.currentTime,0.1);
  baseGain.gain.setTargetAtTime(Math.min(0.3,avg/200),actx.currentTime,0.1);
}

// RECORD
let recorder=null, chunks=[];
document.getElementById('rec').onclick=()=>{
  if(!recorder){
    recorder=new MediaRecorder(canvas.captureStream(30));
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>document.getElementById('dl').disabled=false;
    recorder.start();
  }else{
    recorder.stop(); recorder=null;
  }
};

document.getElementById('dl').onclick=()=>{
  const blob=new Blob(chunks,{type:'video/webm'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='echomotion.webm'; a.click();
};

// DRAW
let history=[];
function draw(blobs){
  ctx.clearRect(0,0,W,H);
  drawVideo();

  history.push(blobs.map(b=>({x:b.cx,y:b.cy})));
  if(history.length>+trailInput.value) history.shift();

  ctx.strokeStyle='rgba(0,255,255,0.25)';
  history.forEach(f=>{
    ctx.beginPath();
    f.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.stroke();
  });

  blobs.forEach(b=>{
    ctx.fillStyle=`hsl(${b.id*60%360},100%,60%)`;
    ctx.beginPath(); ctx.arc(b.cx,b.cy,6,0,Math.PI*2); ctx.fill();
  });

  if(overlay.value==='hull'){
    ctx.strokeStyle='yellow'; ctx.beginPath();
    blobs.forEach((p,i)=> i?ctx.lineTo(p.cx,p.cy):ctx.moveTo(p.cx,p.cy));
    ctx.closePath(); ctx.stroke();
  }
}

function loop(){
  requestAnimationFrame(loop);
  if(video.readyState<2) return;
  drawVideo();
  const b=getBlobs();
  track(b);
  draw(b);
  react(b);
}
loop();
</script>
</body>
</html>
