<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMotion - Core Engine</title>
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
canvas { display:block; }
#ui {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:12px; border-radius:10px;
  width:240px;
}
label { font-size:12px; display:block; margin-top:8px; }
input, select { width:100%; }
button { margin-top:6px; width:100%; }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <b>EchoMotion</b>

  <label>Sensitivity
    <input type="range" id="sensitivity" min="10" max="80" value="40">
  </label>

  <label>Min Blob Size
    <input type="range" id="minSize" min="20" max="500" value="100">
  </label>

  <label>Trail Length
    <input type="range" id="trail" min="2" max="30" value="10">
  </label>

  <label>Overlay
    <select id="overlay">
      <option value="none">None</option>
      <option value="hull">Convex Hull</option>
      <option value="delaunay">Delaunay</option>
    </select>
  </label>

  <button onclick="startCamera()">Start Camera</button>
  <input type="file" id="fileInput">
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.onresize = resize; resize();

// CAMERA
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
}

// FILE INPUT
document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0];
  if(file){ video.src = URL.createObjectURL(file); }
};

// MOTION + BLOBS
let prevFrame;

function getBlobs(){
  ctx.drawImage(video,0,0,W,H);
  const frame = ctx.getImageData(0,0,W,H);
  const blobs = [];
  const visited = new Uint8Array(W*H);

  const threshold = +document.getElementById('sensitivity').value;

  function idx(x,y){ return y*W+x; }

  if(prevFrame){
    for(let y=0;y<H;y+=2){
      for(let x=0;x<W;x+=2){
        let i = (y*W + x)*4;
        let diff = Math.abs(frame.data[i] - prevFrame.data[i]);

        if(diff > threshold && !visited[idx(x,y)]){
          let stack = [[x,y]];
          let points = [];

          while(stack.length){
            let [sx,sy] = stack.pop();
            if(sx<0||sy<0||sx>=W||sy>=H) continue;
            let id = idx(sx,sy);
            if(visited[id]) continue;

            let si = (sy*W + sx)*4;
            let d = Math.abs(frame.data[si] - prevFrame.data[si]);
            if(d < threshold) continue;

            visited[id]=1;
            points.push([sx,sy]);

            stack.push([sx+2,sy]);
            stack.push([sx-2,sy]);
            stack.push([sx,sy+2]);
            stack.push([sx,sy-2]);
          }

          if(points.length > +document.getElementById('minSize').value){
            let cx=0, cy=0;
            points.forEach(p=>{ cx+=p[0]; cy+=p[1]; });
            cx/=points.length; cy/=points.length;

            blobs.push({cx, cy, points});
          }
        }
      }
    }
  }

  prevFrame = frame;
  return blobs;
}

// TRAILS
let history = [];

function updateHistory(blobs){
  history.push(blobs.map(b=>({x:b.cx,y:b.cy})));
  if(history.length > +document.getElementById('trail').value){
    history.shift();
  }
}

// DRAW
function draw(blobs){
  ctx.fillStyle='black';
  ctx.fillRect(0,0,W,H);

  // trails
  ctx.strokeStyle='rgba(0,255,255,0.3)';
  history.forEach((frame,i)=>{
    ctx.beginPath();
    frame.forEach(p=> ctx.lineTo(p.x,p.y));
    ctx.stroke();
  });

  // blobs
  ctx.fillStyle='white';
  blobs.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.cx,b.cy,5,0,Math.PI*2);
    ctx.fill();
  });

  // overlays
  const mode = document.getElementById('overlay').value;

  if(mode==='hull') drawHull(blobs);
  if(mode==='delaunay') drawLines(blobs);
}

// HULL (simple)
function drawHull(blobs){
  if(blobs.length<3) return;
  ctx.strokeStyle='yellow';
  ctx.beginPath();
  blobs.forEach((b,i)=>{
    if(i===0) ctx.moveTo(b.cx,b.cy);
    else ctx.lineTo(b.cx,b.cy);
  });
  ctx.closePath();
  ctx.stroke();
}

// DELAUNAY APPROX
function drawLines(blobs){
  ctx.strokeStyle='lime';
  blobs.forEach(a=>{
    blobs.forEach(b=>{
      if(a!==b){
        ctx.beginPath();
        ctx.moveTo(a.cx,a.cy);
        ctx.lineTo(b.cx,b.cy);
        ctx.stroke();
      }
    });
  });
}

// LOOP
function loop(){
  requestAnimationFrame(loop);
  if(video.readyState<2) return;

  let blobs = getBlobs();
  updateHistory(blobs);
  draw(blobs);
}

loop();
</script>

</body>
</html>
