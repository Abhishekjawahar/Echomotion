<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMotion - Production</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
#wrap{position:relative;width:100vw;height:100vh}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
padding:10px 14px;border-radius:12px;display:flex;gap:10px;flex-wrap:wrap}
button,input{padding:6px 10px;border-radius:6px;border:none}
</style>
</head>
<body>
<div id="wrap">
<video id="video" autoplay playsinline muted style="display:none"></video>
<canvas id="canvas"></canvas>
<div id="ui">
<button id="front">Front</button>
<button id="back">Back</button>
<input type="file" id="file" accept="video/*">
<button id="rec">Rec</button>
<button id="stop">Stop</button>
</div>
</div>
<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let stream=null,prev=null,blobs=[];

function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
window.onresize=resize;resize();

async function cam(mode){
 if(stream) stream.getTracks().forEach(t=>t.stop());
 stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:mode}});
 video.srcObject=stream;video.src=null;await video.play();
}
front.onclick=()=>cam('user');
back.onclick=()=>cam('environment');

file.onchange=e=>{
 const f=e.target.files[0]; if(!f) return;
 if(stream) stream.getTracks().forEach(t=>t.stop());
 video.srcObject=null; video.src=URL.createObjectURL(f);
 video.loop=true; video.onloadeddata=()=>video.play();
}

function drawVideo(){
 const vw=video.videoWidth, vh=video.videoHeight;
 if(!vw) return;
 const cr=canvas.width/canvas.height, vr=vw/vh;
 let w,h,x,y;
 if(vr>cr){w=canvas.width;h=w/vr;x=0;y=(canvas.height-h)/2}
 else{h=canvas.height;w=h*vr;y=0;x=(canvas.width-w)/2}
 ctx.drawImage(video,x,y,w,h);
 return{x,y,w,h};
}

function detect(b){
 if(!b) return;
 const f=ctx.getImageData(b.x,b.y,b.w,b.h);
 if(!prev){prev=f;return}
 blobs=[];
 for(let i=0;i<f.data.length;i+=80){
  let d=Math.abs(f.data[i]-prev.data[i]);
  if(d>35){
   let px=(i/4)%b.w+b.x;
   let py=Math.floor((i/4)/b.w)+b.y;
   blobs.push({x:px,y:py});
  }
 }
 prev=f;
}

function group(){
 let groups=[];
 blobs.forEach(p=>{
  let g=groups.find(g=>Math.hypot(g.cx-p.x,g.cy-p.y)<40);
  if(g){g.points.push(p);g.cx=(g.cx+p.x)/2;g.cy=(g.cy+p.y)/2}
  else groups.push({points:[p],cx:p.x,cy:p.y});
 });
 return groups;
}

function draw(groups){
 ctx.fillStyle='rgba(255,80,80,0.9)';
 groups.forEach(g=>{
  ctx.beginPath();ctx.arc(g.cx,g.cy,6,0,Math.PI*2);ctx.fill();
 });
}

// AUDIO
let actx,base,mod;
document.body.onclick=()=>{
 if(!actx){
  actx=new AudioContext();
  base=actx.createOscillator();
  mod=actx.createGain();
  base.frequency.value=110;
  mod.gain.value=0.1;
  base.connect(mod).connect(actx.destination);
  base.start();
 }
}

function sound(groups){
 if(!actx) return;
 let intensity=groups.length;
 mod.gain.value=0.05+intensity*0.01;
 base.frequency.value=110+intensity*5;
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 if(video.readyState>=2){
  let b=drawVideo();
  detect(b);
  let g=group();
  draw(g);
  sound(g);
 }
 requestAnimationFrame(loop);
}
loop();

// RECORD
let rec,chunks=[];
recBtn=rec;stopBtn=stop;
recBtn.onclick=()=>{
 const s=canvas.captureStream();
 rec=new MediaRecorder(s);
 rec.ondataavailable=e=>chunks.push(e.data);
 rec.onstop=()=>{
  let blob=new Blob(chunks,{type:'video/webm'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='echomotion.webm';a.click();chunks=[];
 };
 rec.start();
};
stopBtn.onclick=()=>{if(rec)rec.stop();};
</script>
</body>
</html>
