<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EchoMotion</title>
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
canvas { display:block; }
#ui {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:10px; border-radius:10px;
}
label { display:block; font-size:12px; }
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>

<div id="ui">
<label>BPM <input type="range" min="60" max="140" value="90" id="bpm"></label>
<label>Volume <input type="range" min="0" max="1" step="0.01" value="0.2" id="vol"></label>
<select id="scale">
<option value="pentatonic">Pentatonic</option>
<option value="minor">Minor</option>
<option value="major">Major</option>
</select>
<button onclick="startCamera()">Camera</button>
<input type="file" id="fileInput">
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.onresize = resize; resize();

// CAMERA
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
}

// FILE INPUT
document.getElementById('fileInput').onchange = e => {
  const file = e.target.files[0];
  video.src = URL.createObjectURL(file);
};

// MOTION DETECTION
let prevFrame;
function getBlobs(){
  ctx.drawImage(video,0,0,W,H);
  let frame = ctx.getImageData(0,0,W,H);
  let blobs = [];

  if(prevFrame){
    for(let i=0;i<frame.data.length;i+=4){
      let diff = Math.abs(frame.data[i]-prevFrame.data[i]);
      if(diff>40){
        let x = (i/4)%W;
        let y = Math.floor((i/4)/W);
        blobs.push({x,y});
      }
    }
  }

  prevFrame = frame;
  return blobs;
}

// AUDIO
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

const scales = {
  pentatonic:[0,2,4,7,9],
  minor:[0,2,3,5,7,8,10],
  major:[0,2,4,5,7,9,11]
};

function midiToFreq(m){
  return 440*Math.pow(2,(m-69)/12);
}

function play(freq, vol){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+0.2);
}

let lastBeat = 0;
function processAudio(blobs){
  let bpm = +document.getElementById('bpm').value;
  let vol = +document.getElementById('vol').value;
  let scale = scales[document.getElementById('scale').value];

  let now = performance.now();
  let interval = 60000/bpm;
  if(now-lastBeat<interval) return;
  lastBeat = now;

  blobs.slice(0,10).forEach(b=>{
    let idx = Math.floor((b.x/W)*scale.length);
    let note = 48 + scale[idx%scale.length];
    play(midiToFreq(note), vol);
  });
}

// DRAW
function loop(){
  requestAnimationFrame(loop);
  if(video.readyState<2) return;

  let blobs = getBlobs();

  ctx.fillStyle='black';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='white';
  blobs.forEach(b=>{
    ctx.fillRect(b.x,b.y,2,2);
  });

  processAudio(blobs);
}

loop();
</script>

</body>
</html>
